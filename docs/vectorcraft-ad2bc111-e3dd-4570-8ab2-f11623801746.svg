<svg viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4a238a"/>
      <stop offset="100%" stop-color="#1a0b35"/>
    </radialGradient>

    <!-- Card Gradients -->
    <linearGradient id="cardRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b4b"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d35e"/>
      <stop offset="100%" stop-color="#1a9c3a"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    
    <!-- Oval Gradient -->
    <linearGradient id="ovalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6e6e6"/>
    </linearGradient>

    <!-- Meeple Gradient -->
    <linearGradient id="meepleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdf00"/>
      <stop offset="100%" stop-color="#e69500"/>
    </linearGradient>

    <!-- Dice Face Gradients -->
    <linearGradient id="diceTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="diceLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6e6e6"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <linearGradient id="diceRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d9d9d9"/>
      <stop offset="100%" stop-color="#b3b3b3"/>
    </linearGradient>

    <!-- Shadows & Filters -->
    <filter id="dropShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <filter id="textShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>
  
  <!-- Subtle Network / Multiplayer Rings -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="16" fill="none">
    <circle cx="256" cy="256" r="120"/>
    <circle cx="256" cy="256" r="200"/>
    <circle cx="256" cy="256" r="280"/>
    <circle cx="256" cy="256" r="360"/>
  </g>

  <!-- Cards Group -->
  <g id="cards">
    
    <!-- Left Card (Green) -->
    <g transform="translate(160, 240) rotate(-25)">
      <!-- Card Border -->
      <rect x="-70" y="-105" width="140" height="210" rx="12" fill="#ffffff" filter="url(#dropShadow)"/>
      <!-- Card Inner -->
      <rect x="-62" y="-97" width="124" height="194" rx="8" fill="url(#cardGreen)"/>
      <!-- Center Oval -->
      <ellipse cx="0" cy="0" rx="45" ry="75" transform="rotate(-25)" fill="url(#ovalGrad)"/>
      <!-- Center Number -->
      <text x="0" y="22" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="64" font-weight="900" font-style="italic" text-anchor="middle" fill="url(#cardGreen)" filter="url(#textShadow)">15</text>
      <!-- Top Left Number -->
      <text x="-42" y="-68" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="22" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff" filter="url(#textShadow)">15</text>
      <!-- Bottom Right Number -->
      <g transform="rotate(180)">
        <text x="-42" y="-68" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="22" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff" filter="url(#textShadow)">15</text>
      </g>
    </g>

    <!-- Right Card (Blue) -->
    <g transform="translate(352, 240) rotate(25)">
      <!-- Card Border -->
      <rect x="-70" y="-105" width="140" height="210" rx="12" fill="#ffffff" filter="url(#dropShadow)"/>
      <!-- Card Inner -->
      <rect x="-62" y="-97" width="124" height="194" rx="8" fill="url(#cardBlue)"/>
      <!-- Center Oval -->
      <ellipse cx="0" cy="0" rx="45" ry="75" transform="rotate(-25)" fill="url(#ovalGrad)"/>
      <!-- Center Number -->
      <text x="0" y="22" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="64" font-weight="900" font-style="italic" text-anchor="middle" fill="url(#cardBlue)" filter="url(#textShadow)">15</text>
      <!-- Top Left Number -->
      <text x="-42" y="-68" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="22" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff" filter="url(#textShadow)">15</text>
      <!-- Bottom Right Number -->
      <g transform="rotate(180)">
        <text x="-42" y="-68" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="22" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff" filter="url(#textShadow)">15</text>
      </g>
    </g>

    <!-- Center Card (Red) - Topmost -->
    <g transform="translate(256, 220) rotate(0)">
      <!-- Card Border -->
      <rect x="-75" y="-112" width="150" height="224" rx="14" fill="#ffffff" filter="url(#dropShadow)"/>
      <!-- Card Inner -->
      <rect x="-66" y="-103" width="132" height="206" rx="9" fill="url(#cardRed)"/>
      <!-- Center Oval -->
      <ellipse cx="0" cy="0" rx="48" ry="80" transform="rotate(-25)" fill="url(#ovalGrad)"/>
      <!-- Center Number -->
      <text x="0" y="24" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="70" font-weight="900" font-style="italic" text-anchor="middle" fill="url(#cardRed)" filter="url(#textShadow)">15</text>
      <!-- Top Left Number -->
      <text x="-45" y="-72" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="24" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff" filter="url(#textShadow)">15</text>
      <!-- Bottom Right Number -->
      <g transform="rotate(180)">
        <text x="-45" y="-72" font-family="'Arial Black', Impact, 'Segoe UI Black', sans-serif" font-size="24" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff" filter="url(#textShadow)">15</text>
      </g>
    </g>

  </g>

  <!-- Board Game Elements -->
  
  <!-- Meeple (Bottom Left) -->
  <g transform="translate(100, 370) scale(1.3)" filter="url(#dropShadow)">
    <path d="M 0 -35 C -12 -35, -18 -25, -12 -15 L -35 -15 C -42 -15, -42 -3, -35 -3 L -18 3 L -25 35 C -25 42, -12 42, -12 35 L 0 15 L 12 35 C 12 42, 25 42, 25 35 L 18 3 L 35 -3 C 42 -3, 42 -15, 35 -15 L 12 -15 C 18 -25, 12 -35, 0 -35 Z" fill="url(#meepleGrad)"/>
    <!-- Meeple Inner Highlight -->
    <path d="M 0 -32 C -8 -32, -13 -25, -9 -17 L -32 -17 C -37 -17, -37 -7, -32 -7 L -16 -1 L -22 29 C -22 34, -13 34, -10 29 L 0 11 L 10 29 C 13 34, 22 34, 22 29 L 16 -1 L 32 -7 C 37 -7, 37 -17, 32 -17 L 9 -17 C 13 -25, 8 -32, 0 -32 Z" fill="#ffffff" fill-opacity="0.2"/>
  </g>

  <!-- Isometric Dice (Bottom Right) -->
  <g transform="translate(412, 375) scale(1.6)">
    <!-- Dice Base Shadow -->
    <path d="M 0 -24 L 30 -9 L 30 25 L 0 40 L -30 25 L -30 -9 Z" fill="#000000" fill-opacity="0.5" filter="url(#dropShadow)"/>
    
    <!-- Dice Faces -->
    <path d="M 0 -24 L 30 -9 L 0 6 L -30 -9 Z" fill="url(#diceTop)" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
    <path d="M -30 -9 L 0 6 L 0 40 L -30 25 Z" fill="url(#diceLeft)" stroke="#e6e6e6" stroke-width="1" stroke-linejoin="round"/>
    <path d="M 0 6 L 30 -9 L 30 25 L 0 40 Z" fill="url(#diceRight)" stroke="#cccccc" stroke-width="1" stroke-linejoin="round"/>
    
    <!-- Dice Dots -->
    <!-- Top Face (1 Dot - Red) -->
    <circle cx="0" cy="-10" r="4.5" fill="#ff3b30"/>
    
    <!-- Left Face (3 Dots - Blue) -->
    <circle cx="-15" cy="14" r="3.5" fill="#007aff"/>
    <circle cx="-7" cy="8" r="3.5" fill="#007aff"/>
    <circle cx="-23" cy="20" r="3.5" fill="#007aff"/>
    
    <!-- Right Face (2 Dots - Green) -->
    <circle cx="10" cy="11" r="3.5" fill="#34c759"/>
    <circle cx="20" cy="17" r="3.5" fill="#34c759"/>
  </g>

  <!-- App Logo Text -->
  <text x="256" y="470" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="8" text-anchor="middle" fill="#ffffff" filter="url(#glow)">QUINCE</text>

  <!-- Inner App Icon Highlight -->
  <rect width="512" height="512" rx="115" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4"/>
</svg>